name: Build and Push prod Image

on:
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Setup QEMU
      uses: docker/setup-qemu-action@v4

    - name: Setup Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Read version
      id: version
      run: echo "VERSION=$(grep -m1 '^## ' CHANGELOG.md | sed 's/^## //')" >> $GITHUB_OUTPUT

    - name: Build and Push
      uses: docker/build-push-action@v7
      with:
        context: .
        target: frankenphp_prod
        push: true
        tags: |
          emiliengibeaud/resa_table:latest
          emiliengibeaud/resa_table:${{ steps.version.outputs.VERSION }}
        platforms: linux/arm64
        # platforms: linux/amd64,linux/arm64

        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_SSH_KEY }}
          script: |
            cd /home/ubuntu/Projets/ResaTable/ResaTable_php
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f